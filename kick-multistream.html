<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kick Multistream</title>
<link rel="apple-touch-icon" sizes="180x180" href="/kick-multistream/img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/kick-multistream/img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/kick-multistream/img/favicon-16x16.png">
<link rel="icon" href="/kick-multistream/img/favicon.ico" sizes="any">
<link rel="manifest" href="/kick-multistream/img/site.webmanifest">

<style>
/* ───────────────────────────────────────────── */
/* GLOBAL RESET & BODY */
/* ───────────────────────────────────────────── */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  margin: 0;
  background: #0a0a0a;
  color: #eee;
  font-family: system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ───────────────────────────────────────────── */
/* TOP TOOLBAR */
/* ───────────────────────────────────────────── */

#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  background: #111;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.logo { font-size: 13px; font-weight: 600; color: #5aff2f; letter-spacing: 0.05em; }
.sub  { font-size: 11px; color: #888; }
.sep  { flex: 1; }

/* Layout buttons */
.layout-btns { display: flex; gap: 4px; }

.lbtn {
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #2a2a2a;
  border-radius: 5px;
  background: #1a1a1a;
  color: #777;
  transition: background 0.1s, color 0.1s;
}

.lbtn:hover { background: #222; color: #ccc; }
.lbtn.active {
  background: #5aff2f;
  color: #0a0a0a;
  border-color: #5aff2f;
  font-weight: 600;
}

/* ───────────────────────────────────────────── */
/* FAVORITES BAR */
/* ───────────────────────────────────────────── */

#fav-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: #0d0d0d;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.fav-label {
  font-size: 10px;
  color: #888;
  white-space: nowrap;
}

.fav-chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  flex: 1;
}

/* ───────────────────────────────────────────── */
/* FAVORITE CHIP */
/* ───────────────────────────────────────────── */

.fav-chip {
  padding: 3px 9px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  background: #1a1a1a;
  color: #888;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  user-select: none;
  transition: background .1s, color .1s;
}

.fav-chip:hover {
  background: #222;
  color: #ccc;
}

/* LIVE state */
.fav-chip.live {
  background: rgba(83,252,24,0.1);
  border-color: #5aff2f;
  color: #5aff2f;
}

/* ───────────────────────────────────────────── */
/* AUTO‑LOAD RADIOBUTTON */
/* ───────────────────────────────────────────── */

.fav-auto {
  appearance: none;
  width: 11px;
  height: 11px;
  border: 2px solid #888;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  margin-right: 4px;
  background: #1a1a1a;
  transition: border-color .15s, box-shadow .15s;
}

.fav-auto:hover {
  border-color: #5aff2f;
  box-shadow: 0 0 6px #5aff2f55;
}

.fav-auto:checked {
  border-color: #5aff2f;
  box-shadow: 0 0 6px #5aff2f88;
}

.fav-auto:checked::after {
  content: "";
  position: absolute;
  inset: 2px;
  background: #5aff2f;
  border-radius: 50%;
  box-shadow: 0 0 4px #5aff2f;
}

/* ───────────────────────────────────────────── */
/* ADD FAVORITE BUTTON */
/* ───────────────────────────────────────────── */

.fav-add-btn {
  padding: 3px 8px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #5aff2f;
  border-radius: 5px;
  background: transparent;
  color: #5aff2f;
  white-space: nowrap;
  transition: background .1s;
}

.fav-add-btn:hover {
  background: #0f2a00;
}

/* ───────────────────────────────────────────── */
/* GRID */
/* ───────────────────────────────────────────── */

.stream-grid {
  display: grid;
  gap: 8px;
  width: 100%;
}

/* 1 stream → 1 sarake */
.stream-grid.streams-1 { 
  grid-template-columns: 1fr; 
}

/* 2 streamiä → 2 saraketta */
.stream-grid.streams-2 { 
  grid-template-columns: repeat(2, 1fr); 
}

/* 3 streamiä → 3 rinnakkain */
.stream-grid.streams-3 {
  grid-template-columns: repeat(3, 1fr);
}

/* 4 streamiä → 2x2 */
.stream-grid.streams-4 {
  grid-template-columns: repeat(2, 1fr);
}

/* 5–9 streamiä → max 3 saraketta (3x2 / 3x3) */
.stream-grid.streams-5,
.stream-grid.streams-6,
.stream-grid.streams-7,
.stream-grid.streams-8,
.stream-grid.streams-9 {
  grid-template-columns: repeat(3, 1fr);
}

#grid {
  flex: 1;
  display: grid;
  gap: 8px;
  padding: 8px;
  min-height: 0;
}

/* ───────────────────────────────────────────── */
/* SLOT */
/* ───────────────────────────────────────────── */

.slot {
  background: #141414;
  border: 1px solid #222;
  border-radius: 6px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
  user-select: none;
  position: relative;
  z-index: auto;

  /* Fade-in */
  opacity: 0;
  animation: slotFadeIn .25s ease forwards;
}

@keyframes slotFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ───────────────────────────────────────────── */
/* BOTTOM GRADIENT (READABILITY) */
/* ───────────────────────────────────────────── */

.slot::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: linear-gradient(to top, rgba(0,0,0,0.45), transparent);
  pointer-events: none;
}

/* ───────────────────────────────────────────── */
/* OVERLAY BASE */
/* ------------------------------------------------ */

.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

/* OVERLAY CONTRAST ON HOVER */
/* ------------------------------------------------ */

.slot:hover .overlay {
  backdrop-filter: brightness(0.8);
}

/* ───────────────────────────────────────────── */
/* ZOOMED SLOT */
/* ───────────────────────────────────────────── */

.slot.zoomed {
  position: fixed;
  inset: 0;
  border-radius: 0;
  border: none;
  z-index: 100;
  box-shadow: 0 0 12px #5aff2f66;
}

/* ───────────────────────────────────────────── */
/* DRAG STATES */
/* ───────────────────────────────────────────── */

.slot.dragging {
  opacity: 0.35;
  border: 1px dashed #5aff2f;
}

.slot.drag-over::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 2px dashed #5aff2f;
  border-radius: 6px;
  pointer-events: none;
  z-index: 200; /* yli videon ja overlayn */
}

.slot.dragging::before {
  display: none !important;
}

.slot.drag-over {
   outline: none;
}

.slot.drag-over:hover {
  z-index: 60;
}


/* ───────────────────────────────────────────── */
/* SLOT BODY + VIDEO/IFRAME */
/* ───────────────────────────────────────────── */

/* Slot body - video first, then chat on right */
.slot-body {
  flex: 1;
  display: flex;
  flex-direction: row;
  min-height: 0;
  position: relative;
}

/* Ensure frame-area comes first, chat comes after */
.slot-body .frame-area {
  order: 1;
}

.slot-body .chat-panel {
  order: 2;
}

/* Stream iframe centered with 16:9 aspect ratio - only target stream frame */
.frame-area iframe.stream-frame {
  aspect-ratio: 16 / 9;
  width: 100%;
  max-height: 100%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
}

/* Chat iframe should not have these styles */
.chat-panel iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* Frame container - 16:9 centering */
.frame-area {
  flex: 1;
  position: relative;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ───────────────────────────────────────────── */
/* PLACEHOLDER */
/* ───────────────────────────────────────────── */

.placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* Stream iframe */
iframe.stream-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  pointer-events: auto;
}

/* Placeholder wrapper täyttää koko frame-alueen */
.placeholder-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

/* Placeholder content sisältää ympyrän ja tekstin */
.placeholder-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* Ympyrä */
.placeholder-circle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #1a1a1a;
  border: 1px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #5aff2f;
  font-weight: bold;
  line-height: 1;
}

/* Teksti */
.placeholder-label {
  margin-top: 8px;
  font-size: 14px;
  color: #bbb;
}

/* ───────────────────────────────────────────── */
/* OVERLAY: LEFT SIDE (BADGES) */
/* ───────────────────────────────────────────── */

.overlay-left {
  position: absolute;
  top: 6px;
  left: 6px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* Neon glow pulse */
@keyframes livePulse {
  0%   { box-shadow: 0 0 4px #5aff2f55, 0 0 0px #5aff2f00; }
  50%  { box-shadow: 0 0 6px #5aff2f99, 0 0 8px #5aff2f33; }
  100% { box-shadow: 0 0 4px #5aff2f55, 0 0 0px #5aff2f00; }
}

/* Fade-in when LIVE appears */
@keyframes liveFadeIn {
  0%   { opacity: 0; transform: scale(0.85); }
  100% { opacity: 1; transform: scale(1); }
}

/* Live badge (base) */
.live-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2px 8px;
  min-width: 48px;
  height: 18px;
  font-size: 10px;
  font-weight: 600;
  border-radius: 4px;
  background: rgba(0,0,0,0.65);
  color: #888;
  border: 1px solid #333;
  backdrop-filter: blur(2px);
  letter-spacing: 0.05em;
  white-space: nowrap;
  text-align: center;
}

/* LIVE state */
.live-badge.live {
  color: #5aff2f;
  border-color: #5aff2f;
  background: rgba(90,255,47,0.12);
  animation:
    liveFadeIn 0.25s ease-out forwards,
    livePulse 1.4s ease-in-out infinite;
}

/* OFFLINE state */
.live-badge.offline {
  color: #888;
  border-color: #333;
  background: rgba(0,0,0,0.45);
}

/* Viewers badge */
.viewers-badge {
  padding: 2px 7px;
  font-size: 10px;
  border-radius: 4px;
  background: rgba(0,0,0,0.7);
  color: #888;
  border: 1px solid #333;
  backdrop-filter: blur(2px);
  white-space: nowrap;
  display: none;
}

.viewers-badge.visible {
  display: block;
}

/* ───────────────────────────────────────────── */
/* OVERLAY: RIGHT SIDE (BUTTONS) */
/* ───────────────────────────────────────────── */

.overlay-right {
  position: absolute;
  top: 6px;
  right: 6px;
  z-index: 10;
  display: flex;
  flex-direction: row;
  gap: 6px;
  align-items: center;
}

/* Base button - same size for all overlay buttons */
.overlay-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  border: 1px solid #888;
  border-radius: 5px;
  background: rgba(0,0,0,0.65);
  color: #ccc;
  backdrop-filter: blur(2px);
  transition: all 0.15s ease;
  white-space: nowrap;
  padding: 0;
}

.overlay-btn:hover {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border-color: #888;
}


/* Zoom button - same fixed size as close button */
.zoom-btn {
  color: #5aff2f;
  border-color: #5aff2f;
  width: 28px;
  height: 28px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
  box-sizing: border-box;
  flex-shrink: 0;
  min-width: 28px;
  min-height: 28px;
}

.zoom-btn:hover {
  background: rgba(83,252,24,0.18);
  color: #7aff3a;
  border-color: #7aff3a;
}

/* Close button - same fixed size */
.close-btn {
  color: #ff4d4d;
  border-color: #ff4d4d;
  width: 28px;
  height: 28px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
  box-sizing: border-box;
}

.close-btn:hover {
  background: rgba(255,0,0,0.18);
  color: #ff7a7a;
  border-color: #ff7a7a;
}

/* ───────────────────────────────────────────── */
/* CHAT PANEL */
/* ───────────────────────────────────────────── */

.chat-panel {
  position: relative;
  z-index: 200;
  width: 0;
  overflow: hidden;
  background: #0d0d0d;
  border-left: none;
  transition: width 0.2s ease, border 0.2s ease;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.chat-panel.open {
  width: 220px;
  border-left: 1px solid #2a2a2a;
}

.chat-panel iframe {
  flex: 1;
  width: 220px;
  height: 100%;
  border: none;
  display: block;
  pointer-events: auto;
  z-index: 300;
  position: relative;
}

/* ───────────────────────────────────────────── */
/* BOTTOM BAR (SEARCH + BUTTONS) */
/* ───────────────────────────────────────────── */

.bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 6px;
  background: #0f0f0f;
  border-top: 1px solid #1e1e1e;
  flex-shrink: 0;
}

/* ───────────────────────────────────────────── */
/* KICK‑TYYLINEN KÄYTTÄJÄNIMI */
/* ───────────────────────────────────────────── */

.ch-label {
  display: flex;
  align-items: center;
  gap: 4px;
  max-width: min(140px, 25%);
  padding: 2px 4px;
  font-size: 11px;
  font-weight: 600;
  color: #5aff2f;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  border-radius: 4px;
  transition: color .15s ease, text-shadow .15s ease, background .15s ease;
}

/* Hover – Kick neon glow */
.ch-label:hover {
  color: #7aff3a;
  background: rgba(90,255,47,0.08);
  text-shadow: 0 0 6px #5aff2f55;
}

/* Linkki‑ikoni */
.ch-label .link-icon {
  font-size: 12px;
  opacity: 0.7;
  transform: translateY(1px);
  transition: opacity .15s ease, transform .15s ease;
}

/* Hover‑animaatio ikonille */
.ch-label:hover .link-icon {
  opacity: 1;
  transform: translateY(-1px);
}

/* ───────────────────────────────────────────── */
/* LOAD STREAM */
/* ───────────────────────────────────────────── */

.add-dialog {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.add-dialog.hidden {
  display: none;
}

.add-dialog-content {
  background: #111;
  padding: 20px;
  border-radius: 8px;
  width: 320px;
  text-align: center;
  border: 1px solid #333;
}

.add-dialog-content h2 {
  margin-bottom: 15px;
  color: #fff;
}

#dialogChannelInput {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #444;
  background: #1a1a1a;
  color: #fff;
}

#dialogLoadBtn {
  width: 100%;
  padding: 10px;
  background: #5aff2f;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 10px;
}

#dialogCloseBtn {
  width: 100%;
  padding: 10px;
  background: #333;
  border: none;
  border-radius: 6px;
  color: #ccc;
  cursor: pointer;
}

#dialogCloseBtn:hover {
  background: #444;
  color: #fff;
}



/* ───────────────────────────────────────────── */
/* SEARCH FIELD */
/* ───────────────────────────────────────────── */

.bar input {
  height: 24px;
  font-size: 11px;
  padding: 2px 6px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 4px;
  color: #ddd;
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
}

.bar input::placeholder {
  color: #666;
}

.bar input:focus {
  border-color: #5aff2f;
  box-shadow: 0 0 6px #5aff2f55;
}

/* ───────────────────────────────────────────── */
/* BUTTONS */
/* ───────────────────────────────────────────── */

/* Base button style */
.bar button,
.mute-btn {
  height: 24px;
  padding: 0 10px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #333;
  border-radius: 4px;
  background: #1a1a1a;
  color: #aaa;
  display: flex;
  align-items: center;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, color .15s, box-shadow .15s;
}

/* General hover (excludes mute) */
.bar button:hover:not(.mute-btn) {
  background: #222;
  color: #fff;
  box-shadow: 0 0 6px #5aff2f55;
}

/* ───────────────────────────────────────────── */
/* PRIMARY BUTTON (Lataa) */
/* ───────────────────────────────────────────── */

.bar button.primary {
  background: #5aff2f;
  color: #0a0a0a;
  border-color: #5aff2f;
  font-weight: 600;
}

.bar button.primary:hover {
  background: #6cff3f;
  box-shadow: 0 0 8px #5aff2f99;
}

/* ───────────────────────────────────────────── */
/* CHAT BUTTON */
/* ───────────────────────────────────────────── */

.bar button.chat-btn {
  margin-left: auto;
  margin-right: 2px;
}

.bar button.chat-btn.active {
  color: #5aff2f;
  border-color: #5aff2f;
  box-shadow: 0 0 6px #5aff2f55;
}

/* ───────────────────────────────────────────── */
/* MUTE BUTTON */
/* ───────────────────────────────────────────── */

.mute-btn {
  background: #1a1a1a;
  color: #888;
}

.mute-btn:hover {
  background: #1a1a1a;
  color: #ccc;
  box-shadow: 0 0 6px #8884;
}

.mute-btn.active {
  background: rgba(255, 60, 60, 0.12);
  border-color: #ff4d4d;
  color: #ff4d4d;
  font-weight: 600;
}

.mute-btn.active:hover {
  background: rgba(255, 60, 60, 0.12);
  box-shadow: 0 0 8px #ff4d4d88;
}

/* ───────────────────────────────────────────── */
/* FOOTER */
/* ───────────────────────────────────────────── */

.footer-overlay {
  text-align: center;
  font-size: 12px;
  color: #777;
  background: rgba(10, 10, 10, 0.9);
  padding: 6px 0;
  border-top: 1px solid #222;
  flex-shrink: 0;
}

.footer-overlay a {
  color: #5aff2f;
  text-decoration: none;
  pointer-events: auto;
}

.footer-overlay a:hover {
  text-shadow: 0 0 6px #5aff2f;
}

.footer-sep {
  margin: 0 6px;
  color: #555;
}

/* ───────────────────────────────────────────── */
/* ABOUT DIALOG */
/* ───────────────────────────────────────────── */

.about-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.about-overlay.hidden {
  display: none;
}

.about-dialog {
  background: #111;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 18px 20px;
  min-width: 260px;
  max-width: 320px;
  color: #eee;
  text-align: left;
  box-shadow: 0 0 18px #000;
}

.about-dialog h2 {
  margin-top: 0;
  margin-bottom: 8px;
  color: #5aff2f;
}

.about-dialog a {
  color: #5aff2f;
  text-decoration: none;
}

.about-dialog a:hover {
  text-decoration: underline;
}

.about-dialog button {
  margin-top: 12px;
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 4px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: #ddd;
  cursor: pointer;
}

/* ───────────────────────────────────────────── */
/* RESPONSIVE (≤ 1200px) */
/* ───────────────────────────────────────────── */

@media (max-width: 1200px) {

  /* Grid pinoutuu pystynäytössä */
  .stream-grid {
    grid-template-columns: 1fr !important;
    gap: 10px;
  }

  /* Overlayjen skaalaus */
  .overlay {
    transform: scale(0.9);
    transform-origin: top left;
  }

  .overlay-left,
  .overlay-right {
    transform: scale(0.85);
    transform-origin: top left;
  }

  /* Slotin leveys ja keskitys */
  .slot {
    margin: 0 auto;
    width: 95%;
  }

  /* Grid padding */
  #grid {
    padding: 6px;
  }

  /* LIVE-badgen hillitympi tausta pienessä näkymässä */
  .live-badge.live {
    background: rgba(90,255,47,0.08);
  }

  /* Chat-paneelin pienempi leveys */
  .chat-panel.open {
    width: 200px;
  }

  .chat-panel iframe {
    width: 200px;
  }
}

/* MOBIILI (≤ 768px) */
/* ───────────────────────────────────────────── */

@media (max-width: 768px) {
  
  /* Rajoita striimien määrä max 3 kpl mobiilissa */
  .slot:nth-child(n+4) {
    display: none;
  }
  
  /* Mobiililaitteiden striimien korkeus ja asettelu */
  .stream-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 10px;
  }
  
  /* Varmista että toolbar pysyy näkyvissä */
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #0a0a0a;
  }
  
  .slot {
    min-height: 200px;
    max-height: 300px;
    flex: 1;
    width: 100%;
  }
  
  /* 1 striimi - keskitä pystysuunnassa */
  .stream-grid.streams-1 .slot {
    max-height: 400px;
    margin: auto;
  }
  
  /* 2 striimiä - tasainen jako */
  .stream-grid.streams-2 .slot {
    flex: 1;
    max-height: 250px;
  }
  
  /* Mobiili-overlayjen parempi klikattavuus */
  .overlay-btn {
    min-width: 40px;
    min-height: 40px;
    font-size: 16px;
    touch-action: manipulation;
  }
  
  /* Mobiili-chat pienempi */
  .chat-panel.open {
    width: 150px;
  }
  
  /* Piilota valikon vaihtoehdot 4-9 mobiilissa */
  .lbtn:nth-child(n+4) {
    display: none;
  }
  
  /* Mobiili-napit normaalikokoisina */
  .lbtn {
    touch-action: manipulation;
  }
  
  /* Mobiili-yksinkertaiset säännöt */
  .stream-frame {
    pointer-events: auto;
  }
  
  .slot {
    position: relative;
  }
}
</style>

</head>
<body>

<div id="toolbar">
  <span class="logo">KICK</span>
  <span class="sub">multistream</span>
  <div class="sep"></div>
  <div class="layout-btns">
    <button class="lbtn active" onclick="setLayout(1)">1</button>
    <button class="lbtn" onclick="setLayout(2)">2</button>
    <button class="lbtn" onclick="setLayout(3)">3</button>
    <button class="lbtn" onclick="setLayout(4)">2x2</button>
    <button class="lbtn" onclick="setLayout(6)">2x3</button>
    <button class="lbtn" onclick="setLayout(9)">3x3</button>
  </div>
</div>

<div id="fav-bar">
  <span class="fav-label">Suosikit:</span>
  <div class="fav-chips" id="fav-chips"></div>
  <button class="fav-add-btn" onclick="addFavorite()">+ Lisää</button>
</div>

<div id="grid"></div>

<div class="footer-overlay">
  © 2026 Kick Multistream — Neon UI by Toni
  <span class="footer-sep">•</span>
  <a href="#" onclick="openAbout(); return false;">About</a>
</div>

<div id="addStreamDialog" class="add-dialog hidden">
  <div class="add-dialog-content">
    <h2 id="dialogTitle">Lisää striimi</h2>

    <input id="dialogChannelInput" type="text" placeholder="Kanavan nimi">
    
    <button id="dialogLoadBtn">Lataa</button>
    <button id="dialogCloseBtn" class="close-btn">Sulje</button>
  </div>
</div>

<div id="aboutOverlay" class="about-overlay hidden">
  <div class="about-dialog">
    <h2>Kick Multistream</h2>
    <p id="aboutVersion"></p>
    <p>Tekijä: Toni, Oulu</p>
    <p>
      Kick: <a href="https://kick.com/ipappa" target="_blank">ipappa</a><br>
      Repo: <a href="https://github.com/ipappa74/kick-multistream" target="_blank">GitHub</a><br>
      Sivusto: <a href="https://ipappa74.github.io/kick-multistream/" target="_blank">GitHub Pages</a>
    </p>
    <button onclick="closeAbout()">Sulje</button>
  </div>
</div>

<script>
// Sovelluksen metatiedot
const APP_META = {
  name: "Kick Multistream",
  version: "1.0.0",
  buildDate: "2026-04-28",
  author: "Toni",
  repo: "https://github.com/ipappa74/kick-multistream",
  homepage: "https://ipappa74.github.io/kick-multistream/"
};

console.log(`${APP_META.name} v${APP_META.version} — ${APP_META.buildDate}`);

  // Mobiililaitteen tunnistus
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
  
  const MAX = isMobile ? 3 : 9; // Rajoita mobiilissa 3 striimiin
  let count = 1;
  let zoomedSlot = -1;

  const channels  = Array(MAX).fill('');
  let muted     = Array(MAX).fill(true); // Muutettu let jotta voidaan päivittää
  const chatOpen  = Array(MAX).fill(false);
  const liveStatus = {};
  const viewers    = {};

  let selectedSlot = null;
  let favorites = JSON.parse(localStorage.getItem('kick-favs') || '[]');
  let autoLoadChannels = JSON.parse(localStorage.getItem('kick-auto-load-channels') || '{}');
  let dragSrcIndex = null;

  // Lataa mute-tilat heti alustuksen jälkeen
  loadState();

	/* ===== DIALOG (UNIFIED) ===== */

	function openDialog(slot, mode){
	  selectedSlot = slot;
	  dialogMode = mode;
	  const title = document.getElementById('dialogTitle') || document.querySelector('.add-dialog-content h2');
	  const loadBtn = document.getElementById('dialogLoadBtn');
	  const input = document.getElementById('dialogChannelInput');
	  
	  if (mode === 'favorite') {
		if (title) title.textContent = 'Lisää suosikki';
		if (loadBtn) loadBtn.textContent = 'Lisää';
		if (input) input.placeholder = 'Kanavan nimi suosikiksi';
	  } else {
		if (title) title.textContent = 'Lisää striimi';
		if (loadBtn) loadBtn.textContent = 'Lataa';
		if (input) input.placeholder = 'Kanavan nimi';
	  }
	  
	  document.getElementById('addStreamDialog').classList.remove('hidden');
	}

	function closeDialog(){
	  document.getElementById('addStreamDialog').classList.add('hidden');
	  document.getElementById('dialogChannelInput').value = '';
	}

	document.getElementById('dialogLoadBtn').onclick = () => {
	  const val = document.getElementById('dialogChannelInput').value.trim();
	  if(!val) return;

	  if(dialogMode === 'stream'){
		channels[selectedSlot] = val;
		// Älä muuta mute-tilaa striimiä avattaessa - pidä olemassa oleva tai oletus muted
		if (muted[selectedSlot] === undefined) muted[selectedSlot] = true;
	  } else if (dialogMode === 'favorite') {
		const ch = val.toLowerCase().replace(/^@/, '');
		if (ch && !favorites.includes(ch)) {
		  favorites.push(ch);
		  localStorage.setItem('kick-favs', JSON.stringify(favorites));
		  checkLiveFavOnly(ch);
		  renderFavorites();
		}
	  }

	  saveState();
	  render();
	  closeDialog();
	};

	document.getElementById('dialogCloseBtn').onclick = closeDialog;

  function saveState() {
    const state = {
      count,
      channels: channels.slice(0, MAX),
      muted: muted.slice(0, MAX)
    };
    localStorage.setItem('kick-state', JSON.stringify(state));
    console.log('State saved:', state.muted.slice(0, 3)); // Debug
  }

	// ======================================================
	// ABOUT DIALOG
	// ======================================================

	function openAbout() {
	  const overlay = document.getElementById("aboutOverlay");
	  const ver = document.getElementById("aboutVersion");
	  if (ver && APP_META) {
		ver.textContent = `Versio: ${APP_META.version} (${APP_META.buildDate})`;
	  }
	  overlay.classList.remove("hidden");
	}

	function closeAbout() {
	  document.getElementById("aboutOverlay").classList.add("hidden");
	}

  function loadState() {
    try {
      const s = JSON.parse(localStorage.getItem('kick-state') || 'null');
      console.log('State loaded from storage:', s?.muted?.slice(0, 3)); // Debug
      if (!s) {
        // Oletus: kaikki slotit muted-tilassa vain jos ei ole aiempaa tilaa
        for (let i = 0; i < MAX; i++) muted[i] = true;
        console.log('No state found, using defaults:', muted.slice(0, 3)); // Debug
        return;
      }
      count = s.count || 1;
      s.channels.forEach((ch, i) => { channels[i] = ch || ''; });
      // Säilytä aiemmat mute-asetukset, älä nollaa niitä
      if (s.muted) {
        s.muted.forEach((m, i) => { 
          if (m !== undefined) muted[i] = m; 
        });
        console.log('Mute states restored:', muted.slice(0, 3)); // Debug
      }
    } catch(e) {
      console.log('Error loading state:', e); // Debug
      // Virhetilanteessa älä muuta olemassa olevia mute-asetuksia
    }
  }

	const layoutMap = { 1:1, 2:2, 3:3, 4:4, 6:6, 9:9 };

	function setLayout(n) {
	  count = layoutMap[n] || n;
	  saveState();
	  document.querySelectorAll('.lbtn').forEach((b, i) => {
		b.classList.toggle('active', [1,2,3,4,6,9][i] === n);
	  });
	  saveState(); // Tallenna uudelleen ennen renderGrid()
	  renderGrid();
	}

  function buildSlot(i) {
    const ch = channels[i] || '';
    const isMuted = muted[i] !== false; // Oletus muted jos ei asetettu
    const isChat  = chatOpen[i];
    const isLive  = ch ? liveStatus[ch] : null;
    const vc      = ch && viewers[ch] != null ? viewers[ch].toLocaleString('fi-FI') : null;

    const overlays = ch ? `
      <div class="overlay-left">
        <div class="live-badge ${isLive === true ? 'live' : isLive === false ? 'offline' : ''}" id="livebadge-${i}">
          ${isLive === true ? 'LIVE' : isLive === false ? 'OFFLINE' : ''}
        </div>
        <div class="viewers-badge ${vc != null ? 'visible' : ''}" id="viewers-${i}">
          ${vc != null ? vc + ' katsojaa' : ''}
        </div>
      </div>

      <div class="overlay-right">
        <button class="overlay-btn close-btn" onclick="closeSlot(${i})" title="Sulje striimi">✕</button>
        <button class="overlay-btn zoom-btn" onclick="toggleZoom(${i})" title="${zoomedSlot === i ? 'Sulje suurennos' : 'Suurenna striimi'}">
          ${zoomedSlot === i ? '−' : '+'}
        </button>
      </div>
    ` : '';

    const frameContent = ch
      ? `<div class="slot" data-index="${i}">
          <iframe class="stream-frame" 
                  src="https://player.kick.com/${ch}?autoplay=true&muted=${isMuted}&parent=localhost" 
                  allow="autoplay; encrypted-media; fullscreen; microphone; picture-in-picture" 
                  referrerpolicy="no-referrer-when-downgrade"
                  style="border: none; width: 100%; height: 100%;"
                  ${isMobile ? 'muted="false"' : ''}>
          </iframe>
          ${overlays}
      </div>`
      : `
        <div class="placeholder-wrap" onclick="addStreamAt(${i})" style="cursor: pointer;">
          <div class="placeholder-content">
            <div class="placeholder-circle">+</div>
            <div class="placeholder-label">Lisää striimi</div>
          </div>
        </div>
      `;

    const chatContent = ch
      ? `<div class="chat-panel ${isChat ? 'open' : ''}" id="chat-${i}">
           <iframe src="${isChat ? `https://kick.com/${ch}/chatroom` : 'about:blank'}" id="chat-iframe-${i}" allowfullscreen></iframe>
         </div>` : '';

    return `
      <div class="slot-body">
        <div class="frame-area" id="fa-${i}">${frameContent}</div>
        ${chatContent}
      </div>

      <div class="bar">
        ${ch ? `<span class="ch-label" onclick="openTab(${i})">
                  ${ch}
                  <span class="link-icon">?</span>
                </span>
              ` : ''}

        <!-- Chat + Mute siirtyvät oikealle -->
        ${ch ? `
          <button class="chat-btn ${isChat ? 'active' : ''}" id="chatbtn-${i}" onclick="toggleChat(${i})">Chat</button>
          <button class="mute-btn ${isMuted ? 'active' : ''}" onclick="toggleMute(${i})">
            ${isMuted ? 'Unmute' : 'Mute'}
          </button>
        ` : ''}
      </div>
    `;
  }

	function applyDesktopGrid(count) {
	  const grid = document.getElementById('grid');

	  // Mobiili → ei muuteta mitään
	  if (window.innerWidth <= 1200) {
		grid.style.gridTemplateColumns = '';
		return;
	  }

	  // Desktop → aina max 3 saraketta
	  const cols = Math.min(3, count); // 1–3 → 1–3, yli 3 → 3
	  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
	}

	function renderGrid() {
	  const grid = document.getElementById('grid');

	  // Automaattinen layout-luokka
	  grid.className = `stream-grid streams-${count}`;
   
	  grid.innerHTML = '';

	  for (let i = 0; i < count; i++) {
		const slot = document.createElement('div');
		slot.className = 'slot' + (zoomedSlot === i ? ' zoomed' : '');
		slot.id = 'slot-' + i;

		slot.setAttribute("draggable", "true");
		slot.dataset.index = i;

		slot.addEventListener("dragstart", onDragStart);
		slot.addEventListener("dragover", onDragOver);
		slot.addEventListener("dragleave", onDragLeave);
		slot.addEventListener("drop", onDrop);
		slot.addEventListener("dragend", onDragEnd);

		slot.innerHTML = buildSlot(i);
		grid.appendChild(slot);
	  }
	}

  function load(i, ch) {
    const inp = document.getElementById('inp-' + i);
    const channel = (ch !== undefined ? ch : inp.value).trim().toLowerCase().replace(/^@/, '');
    if (inp) inp.value = channel;
    channels[i] = channel;
    // Älä muuta mute-tilaa ladattaessa - säilytä olemassa oleva tila (oletus muted)
    if (muted[i] === undefined) muted[i] = true;
    chatOpen[i] = false;
    saveState();
    const slot = document.getElementById('slot-' + i);
    if (slot) slot.innerHTML = buildSlot(i);
    if (channel) checkLive(channel, i);
  }

  function toggleMute(i) {
    // Toggle muted state - oletus on true (muted) jos undefined
    muted[i] = muted[i] === false ? true : false;
    saveState();

    const ch = channels[i];
    if (!ch) return;

    const iframe = document.querySelector(`#slot-${i} .stream-frame`);
    if (iframe) {
      iframe.src = `https://player.kick.com/${ch}?autoplay=true&muted=${muted[i]}`;
    }

    const muteBtn = document.querySelector(`#slot-${i} .mute-btn`);
    if (muteBtn) {
      muteBtn.classList.toggle('active', muted[i] !== false);
      muteBtn.textContent = muted[i] !== false ? 'Unmute' : 'Mute';
    }
    
    // Kiertoratkaisu Kick API:n mute-nollaukselle - palauta muut slotit oikeaan tilaan
    setTimeout(() => {
      for (let j = 0; j < MAX; j++) {
        if (j !== i && channels[j]) {
          const otherMuteBtn = document.querySelector(`#slot-${j} .mute-btn`);
          if (otherMuteBtn) {
            // Varmista että slot on olemassa ennen napin päivittämistä
            const slot = document.getElementById(`slot-${j}`);
            if (slot && slot.querySelector('.stream-frame')) {
              otherMuteBtn.classList.toggle('active', muted[j] !== false);
              otherMuteBtn.textContent = muted[j] !== false ? 'Unmute' : 'Mute';
              
              // Jos striimi on unmuted ja jäänyt, lataa se uudelleen
              if (muted[j] === false) {
                const iframe = slot.querySelector('.stream-frame');
                if (iframe) {
                  const ch = channels[j];
                  iframe.src = `https://player.kick.com/${ch}?autoplay=true&muted=false`;
                }
              }
            }
          }
        }
      }
    }, 100);
  }

  function closeSlot(i) {
    channels[i] = '';
    chatOpen[i] = false;
    // Älä resetoi mute-tilaa sulkemisessa - säilytä käyttäjän asetus
    saveState();
    const slot = document.getElementById('slot-' + i);
    if (slot) slot.innerHTML = buildSlot(i);
  }

  function toggleZoom(i) {
    zoomedSlot = zoomedSlot === i ? -1 : i;
    // Päivitä vain zoom-tilat, älä uudelleenrakenna koko gridiä
    document.querySelectorAll('.slot').forEach((slot, idx) => {
      slot.classList.toggle('zoomed', idx === zoomedSlot);
    });
    
    // Päivitä myös napin tooltip ja symboli
    const zoomBtn = document.querySelector(`#slot-${i} .zoom-btn`);
    if (zoomBtn) {
      zoomBtn.textContent = zoomedSlot === i ? '−' : '+';
      zoomBtn.title = zoomedSlot === i ? 'Sulje suurennos' : 'Suurenna striimi';
    }
  }

  function toggleChat(i) {
    chatOpen[i] = !chatOpen[i];
    saveState(); // Tallenna chatOpen tila

    const panel = document.getElementById('chat-' + i);
    const btn   = document.getElementById('chatbtn-' + i);
    if (!panel) return;

    panel.classList.toggle('open', chatOpen[i]);
    if (btn) btn.classList.toggle('active', chatOpen[i]);

    if (chatOpen[i]) {
      const iframe = document.getElementById('chat-iframe-' + i);
      const ch = channels[i];
      if (iframe && iframe.src === 'about:blank' && ch) {
        iframe.src = `https://kick.com/${ch}/chatroom`;
      }
    }
  }

  function openTab(i) {
    const ch = channels[i];
    if (ch) window.open('https://kick.com/' + ch, '_blank');
  }

  async function checkLive(ch, slotIndex) {
    if (!ch) return;
    try {
      const res = await fetch(`https://kick.com/api/v1/channels/${ch}`, {
        headers: { 'Accept': 'application/json' }
      });
      if (!res.ok) return;

      const data = await res.json();
      const isLive = !!(data.livestream && data.livestream.is_live);
      liveStatus[ch] = isLive;

      if (isLive && data.livestream.viewer_count != null) {
        viewers[ch] = data.livestream.viewer_count;
      } else {
        viewers[ch] = null;
      }

      if (slotIndex !== undefined) {
        const badge = document.getElementById('livebadge-' + slotIndex);
        if (badge) {
          badge.className = 'live-badge ' + (isLive ? 'live' : 'offline');
          badge.textContent = isLive ? 'LIVE' : 'OFFLINE';
        }

        const vEl = document.getElementById('viewers-' + slotIndex);
        if (vEl) {
          if (isLive && viewers[ch] != null) {
            vEl.className = 'viewers-badge visible';
            vEl.textContent = viewers[ch].toLocaleString('fi-FI') + ' katsojaa';
          } else {
            vEl.className = 'viewers-badge';
            vEl.textContent = '';
          }
        }
      }

      if (!isLive && slotIndex !== undefined) {
        closeSlot(slotIndex);
      }

      updateFavoriteChips();
    } catch(e) {}
  }

  async function checkLiveFavOnly(ch) {
    if (!ch) return;
    try {
      const res = await fetch(`https://kick.com/api/v1/channels/${ch}`, {
        headers: { 'Accept': 'application/json' }
      });
      if (!res.ok) return;

      const data = await res.json();
      const wasLive = liveStatus[ch] === true;
      const isLive = !!(data.livestream && data.livestream.is_live);

      liveStatus[ch] = isLive;

      if (autoLoadChannels[ch] === true && isLive && !wasLive) {
        const loaded = channels.slice(0, count);
        if (!loaded.includes(ch)) {
          let target = loaded.indexOf('');
          if (target === -1) target = 0;
          load(target, ch);
        }
      }

      updateFavoriteChips();
    } catch(e) {}
  }

  function checkAllLive() {
    for (let i = 0; i < count; i++) {
      if (channels[i]) checkLive(channels[i], i);
    }
    favorites.forEach(fav => {
      if (!channels.slice(0, count).includes(fav)) checkLiveFavOnly(fav);
    });
  }

  function renderFavorites() {
    const chips = document.getElementById('fav-chips');
    chips.innerHTML = '';

    const sorted = [...favorites].sort((a, b) => {
      const aLive = liveStatus[a] === true ? 1 : 0;
      const bLive = liveStatus[b] === true ? 1 : 0;
      return bLive - aLive;
    });

    sorted.forEach((fav) => {
      const isLive = liveStatus[fav];
      const auto = autoLoadChannels[fav] === true;

      const chip = document.createElement('span');
      chip.className = 'fav-chip' + (isLive ? ' live' : '');
      chip.title = 'Klikkaa ladataksesi. Oikea klikkaus poistaa.';

      chip.innerHTML = `
        <input type="checkbox" class="fav-auto" data-ch="${fav}" ${auto ? 'checked' : ''}>
        <span>${fav}</span>
      `;

      chip.onclick = (e) => {
        if (e.target.classList.contains('fav-auto')) return;
        loadFavoriteToSlot(fav);
      };

      chip.oncontextmenu = (e) => {
        e.preventDefault();
        removeFavorite(favorites.indexOf(fav));
      };

      chips.appendChild(chip);
    });

    document.querySelectorAll('.fav-auto').forEach(cb => {
      cb.addEventListener('change', (e) => {
        const ch = e.target.dataset.ch;
        autoLoadChannels[ch] = e.target.checked;
        localStorage.setItem('kick-auto-load-channels', JSON.stringify(autoLoadChannels));
      });
    });
  }

  function updateFavoriteChips() { renderFavorites(); }

  function addFavorite() {
    openDialog(null, 'favorite');
  }

  function addStreamAt(i) {
    openDialog(i, 'stream');
  }

  function removeFavorite(fi) {
    favorites.splice(fi, 1);
    localStorage.setItem('kick-favs', JSON.stringify(favorites));
    renderFavorites();
  }

  function loadFavoriteToSlot(ch) {
    let target = channels.slice(0, count).indexOf('');
    if (target === -1) target = 0;
    load(target, ch);
  }

  function onDragStart(e) {
    dragSrcIndex = Number(this.dataset.index);
    this.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  }

  function onDragOver(e) {
    e.preventDefault();
    this.classList.add("drag-over");
    e.dataTransfer.dropEffect = "move";
  }

  function onDragLeave() {
    this.classList.remove("drag-over");
  }

  function onDrop(e) {
    e.preventDefault();
    this.classList.remove("drag-over");

    const targetIndex = Number(this.dataset.index);
    if (dragSrcIndex === targetIndex) return;

    swapSlots(dragSrcIndex, targetIndex);
    renderGrid();
  }

  function onDragEnd() {
    this.classList.remove("dragging");
  }

  function swapSlots(a, b) {
    [channels[a], channels[b]] = [channels[b], channels[a]];
    [muted[a], muted[b]] = [muted[b], muted[a]];
    [chatOpen[a], chatOpen[b]] = [chatOpen[b], chatOpen[a]];
    saveState();
  }

  function render() {
    renderGrid();
  }

  renderFavorites();

  document.querySelectorAll('.lbtn').forEach((b, i) => {
    b.classList.toggle('active', [1,2,3,4,6,9][i] === count);
  });

  renderGrid();
  favorites.forEach(fav => checkLiveFavOnly(fav));

  // Fullscreen-tapahtumien käsittely
  document.addEventListener('fullscreenchange', () => {
    saveState(); // Tallenna mute-tilat fullscreen-tilan muuttuessa
  });

  document.addEventListener('webkitfullscreenchange', () => {
    saveState(); // Safari-tuki
  });

  document.addEventListener('mozfullscreenchange', () => {
    saveState(); // Firefox-tuki
  });

  document.addEventListener('MSFullscreenChange', () => {
    saveState(); // IE/Edge-tuki
  });

  // Window resize -tapahtuman käsittely
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      saveState(); // Tallenna mute-tilat resize-tapahtuman jälkeen
      
      // Kiertoratkaisu Kick API:n mute-nollaukselle - useita tarkistuksia
      const fixMuteStates = () => {
        for (let j = 0; j < MAX; j++) {
          if (channels[j]) {
            const muteBtn = document.querySelector(`#slot-${j} .mute-btn`);
            if (muteBtn) {
              const slot = document.getElementById(`slot-${j}`);
              if (slot && slot.querySelector('.stream-frame')) {
                const shouldBeMuted = muted[j] !== false;
                const isCurrentlyMuted = muteBtn.classList.contains('active');
                
                // Päivitä vain jos tila on väärä
                if (shouldBeMuted !== isCurrentlyMuted) {
                  muteBtn.classList.toggle('active', shouldBeMuted);
                  muteBtn.textContent = shouldBeMuted ? 'Unmute' : 'Mute';
                  
                  // Jos striimi on unmuted, lataa se uudelleen (mutta ei liian usein)
                  if (!shouldBeMuted) {
                    const iframe = slot.querySelector('.stream-frame');
                    if (iframe && !iframe.dataset.reloading) {
                      const ch = channels[j];
                      // Estä liian useat uudelleenlataukset
                      iframe.dataset.reloading = 'true';
                      iframe.src = `https://player.kick.com/${ch}?autoplay=true&muted=false`;
                      setTimeout(() => {
                        delete iframe.dataset.reloading;
                      }, 1000);
                    }
                  }
                }
              }
            }
          }
        }
      };
      
      // Useita tarkistuksia eri viiveillä - erityinen käsittely ensimmäiselle striimille
      const fixFirstSlot = () => {
        if (channels[0]) {
          const muteBtn = document.querySelector(`#slot-0 .mute-btn`);
          if (muteBtn) {
            const slot = document.getElementById('slot-0');
            if (slot && slot.querySelector('.stream-frame')) {
              const shouldBeMuted = muted[0] !== false;
              muteBtn.classList.toggle('active', shouldBeMuted);
              muteBtn.textContent = shouldBeMuted ? 'Unmute' : 'Mute';
              
              // Jos striimi on unmuted, lataa se uudelleen (mutta ei liian usein)
              if (!shouldBeMuted) {
                const iframe = slot.querySelector('.stream-frame');
                if (iframe && !iframe.dataset.reloading) {
                  const ch = channels[0];
                  // Estä liian useat uudelleenlataukset
                  iframe.dataset.reloading = 'true';
                  iframe.src = `https://player.kick.com/${ch}?autoplay=true&muted=false`;
                  setTimeout(() => {
                    delete iframe.dataset.reloading;
                  }, 1000);
                }
              }
            }
          }
        }
      };
      
      fixMuteStates();
      fixFirstSlot(); // Välitön korjaus ensimmäiselle
      setTimeout(() => { fixMuteStates(); fixFirstSlot(); }, 25);
      setTimeout(() => { fixMuteStates(); fixFirstSlot(); }, 75);
      setTimeout(() => { fixMuteStates(); fixFirstSlot(); }, 150);
      setTimeout(() => { fixMuteStates(); fixFirstSlot(); }, 300);
    }, 50); // Lyhyempi ensimmäinen viive
  });

  for (let i = 0; i < count; i++) {
    if (channels[i]) checkLive(channels[i], i);
  }

  setInterval(checkAllLive, 60000);

  setInterval(() => {
    channels.forEach((ch, i) => {
      if (ch) checkLive(ch, i);
    });
  }, 20000);

  // Mobiili-äänitoiston tuki (parannettu)
  if (isMobile) {
    function enableAudio() {
      document.querySelectorAll('.stream-frame').forEach(iframe => {
        try {
          // Aseta iframe-ominaisuudet äänitoistoa varten
          iframe.muted = false;
          iframe.volume = 1.0;
          iframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
          
          // Yritä useita tapoja
          if (iframe.contentWindow) {
            iframe.contentWindow.postMessage({ action: 'play' }, '*');
            iframe.contentWindow.postMessage({ action: 'unmute' }, '*');
            iframe.contentWindow.postMessage({ action: 'enableAudio' }, '*');
            iframe.contentWindow.postMessage({ action: 'setVolume', volume: 1.0 }, '*');
          }
          
          // Yritä myös suoraan
          if (iframe.play) {
            iframe.play().catch(e => console.log('Direct play failed:', e));
          }
        } catch (e) {
          console.log('Audio enable failed:', e);
        }
      });
    }
    
    // Lisää kuuntelijat useisiin tapahtumiin
    document.addEventListener('click', enableAudio, { once: true });
    document.addEventListener('touchstart', enableAudio, { once: true });
    document.addEventListener('keydown', enableAudio, { once: true });
    
    // Lisää myös jatkuva kuuntelu slot-klikkauksille
    document.addEventListener('click', function(e) {
      if (e.target.closest('.slot')) {
        enableAudio();
      }
    });
    
    document.addEventListener('touchstart', function(e) {
      if (e.target.closest('.slot')) {
        enableAudio();
      }
    });
  }

</script>
</body>
