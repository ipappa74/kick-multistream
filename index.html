<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kick Multistream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
<link rel="icon" href="/img/favicon.ico" sizes="any">
<link rel="manifest" href="/img/site.webmanifest">

<style>
/* ───────────────────────────────────────────── */
/* GLOBAL */
/* ───────────────────────────────────────────── */

body {
  margin: 0;
  padding: 0;
  background: #050505;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #e6e6e6;
  overflow-x: hidden;
}

/* Neon glow animation */
@keyframes neonPulse {
  0%   { text-shadow: 0 0 4px #5aff2f55, 0 0 8px #5aff2f33; }
  50%  { text-shadow: 0 0 10px #5aff2f99, 0 0 18px #5aff2f55; }
  100% { text-shadow: 0 0 4px #5aff2f55, 0 0 8px #5aff2f33; }
}

/* ───────────────────────────────────────────── */
/* ANIMATED NEON GRID + PARTICLES */
/* ───────────────────────────────────────────── */

.bg-container {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: -1;
}

.neon-grid {
  position: absolute;
  inset: 0;
  z-index: -2;
  background-image: url("data:image/svg+xml;utf8,\
    <svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 60 60'>\
      <rect width='60' height='60' fill='none' stroke='rgba(90,255,47,0.18)' stroke-width='1'/>\
    </svg>");
  background-size: 60px 60px;
  animation: gridScroll 18s linear infinite;
  opacity: 0.25;
  filter: drop-shadow(0 0 6px #5aff2f55);
}

@keyframes gridScroll {
  0%   { background-position: 0 0; }
  100% { background-position: 60px 60px; }
}

/* Particles layer */
.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Single particle */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #5aff2f;
  border-radius: 50%;
  opacity: 0.8;
  filter: drop-shadow(0 0 6px #5aff2f);
  animation: particleMove linear infinite;
}

/* Particle animation */
@keyframes particleMove {
  0% {
    transform: translateY(0) translateX(0);
    opacity: 0.9;
  }
  100% {
    transform: translateY(-120vh) translateX(20px);
    opacity: 0;
  }
}

/* CRT scanline effect */
.crt-scanlines {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.3) 0px,
    rgba(0, 0, 0, 0.3) 1px,
    transparent 1px,
    transparent 2px
  );
  opacity: 0.8;
  animation: crtFlicker 0.15s infinite;
}

/* Flicker animation */
@keyframes crtFlicker {
  0%   { opacity: 0.8; }
  50%  { opacity: 0.85; }
  100% { opacity: 0.8; }
}

/* ───────────────────────────────────────────── */
/* HERO SECTION */
/* ───────────────────────────────────────────── */

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.title {
  font-size: 64px;
  font-weight: 900;
  color: #5aff2f;
  text-align: center;
  animation: neonPulse 2s ease-in-out infinite;
  letter-spacing: 2px;
}

.subtitle {
  margin-top: 10px;
  font-size: 20px;
  color: #aaa;
  text-align: center;
  max-width: 600px;
  line-height: 1.6;
}

/* Mobiili-skaalaus */
@media (max-width: 768px) {
  .title {
    font-size: 36px;
    letter-spacing: 1px;
  }
  
  .subtitle {
    font-size: 16px;
    margin-top: 8px;
    max-width: 90%;
  }
}

/* ───────────────────────────────────────────── */
/* BUTTON */
/* ───────────────────────────────────────────── */

.launch-btn {
  margin-top: 40px;
  padding: 14px 36px;
  font-size: 20px;
  font-weight: 700;
  color: #0a0a0a;
  background: #5aff2f;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s ease;
  box-shadow: 0 0 12px #5aff2f55;
}

.launch-btn:hover {
  background: #7aff3a;
  box-shadow: 0 0 18px #5aff2f99;
  transform: translateY(-2px);
}

/* ───────────────────────────────────────────── */
/* FOOTER */
/* ───────────────────────────────────────────── */

.footer {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: #555;
  font-size: 13px;
}
</style>
</head>

<body>
<div class="bg-container">
  <div class="neon-grid"></div>
  <div class="particles" id="particles"></div>
  <div class="crt-scanlines"></div>
</div>

<div class="hero">
  <div class="title">KICK MULTISTREAM</div>
  <div class="subtitle">
    Kevyt, nopea ja neon‑henkinen monistriimaustyökalu Kick.com‑alustalle.
    Katso useita striimejä, avaa chatit, järjestele slotteja ja seuraa LIVE‑tilaa reaaliajassa.
  </div>

  <button class="launch-btn" onclick="location.href='kick-multistream.html'">
    Käynnistä sovellus
  </button>
</div>

<div class="footer">
  © 2026 Kick Multistream — Neon UI by Toni
</div>

<script>
/* Generate neon particles */
const container = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.className = "particle";

  const size = Math.random() * 3 + 2;
  p.style.width = size + "px";
  p.style.height = size + "px";

  p.style.left = Math.random() * 100 + "vw";
  p.style.top = Math.random() * 100 + "vh";

  const duration = Math.random() * 12 + 8;
  p.style.animationDuration = duration + "s";

  const delay = Math.random() * -duration;
  p.style.animationDelay = delay + "s";

  container.appendChild(p);
}
</script>

</body>
</html>
